<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Casa Certa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🏠</span>
                <span>Casa<span class="logo-highlight">Certa</span></span>
            </a>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-card">
            <h1>Bem-vindo de volta</h1>
            <p>Entre na sua conta para continuar</p>

            <div id="error" class="form-error" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary btn-large" style="width: 100%;">Entrar →</button>
            </form>

            <div class="form-footer">
                <p>Não tem conta? <a href="registar.html">Registe-se grátis</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
